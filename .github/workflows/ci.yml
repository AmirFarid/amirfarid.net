name: CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Astro check and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata
        run: npm run version:generate

      - name: Astro check
        run: npx astro check

      - name: Astro build
        run: npx astro build
